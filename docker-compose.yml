version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=Route Mobile API
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres_password@db:5432/ai_gateway
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=e42fa521f57912187bc9ba6f196bcf72e1ab5a7828de3e40776b6d51111956e1
      - MISTRAL_API_KEY=EuOhDKAse8czGM9Z7Du7Edk98MsuUPcd
      - DEFAULT_MODEL=gemini-1.5-flash
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: ai_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
